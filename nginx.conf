# ============================================================
# StudyAI – nginx.conf
# Reverse proxy for Gunicorn, SSL termination, static caching
# ============================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name studyai.app www.studyai.app;

    # Let's Encrypt ACME challenge (before redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name studyai.app www.studyai.app;

    # ── SSL certificates (Let's Encrypt / Certbot) ─────────────────────────
    # Generate with: certbot certonly --standalone -d studyai.app -d www.studyai.app
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── SSL hardening ────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Upload size (for PDF uploads – must match MAX_PDF_SIZE_MB in .env) ──
    client_max_body_size 60M;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # ── Static assets – long-lived cache ────────────────────────────────────
    location ~* \.(js|css|svg|png|ico|woff|woff2|ttf|webp)$ {
        proxy_pass         http://web:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Service Worker – no cache (must stay fresh) ──────────────────────────
    location = /sw.js {
        proxy_pass http://web:8080;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── SSE endpoints – disable proxy buffering ───────────────────────────────
    # SSE requires chunked transfer; buffering would delay events.
    location ~ ^/api/(analyze|flashcards|quiz) {
        proxy_pass         http://web:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable buffering
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        chunked_transfer_encoding on;
    }

    # ── All other requests – proxy to Gunicorn ───────────────────────────────
    location / {
        proxy_pass         http://web:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Gunicorn timeout = 300s → nginx must be slightly higher so Gunicorn
        # kills the worker first (clean 504) rather than nginx dropping mid-stream (502)
        proxy_read_timeout    310s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    310s;
    }
}

