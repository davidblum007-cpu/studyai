# Gitleaks configuration – prevents committing secrets
# Run: gitleaks detect --config .gitleaks.toml
# Install: https://github.com/gitleaks/gitleaks

title = "StudyAI Secret Detection"

[extend]
useDefault = true

[[rules]]
id          = "anthropic-api-key"
description = "Anthropic API Key"
regex       = '''sk-ant-api\d+-[A-Za-z0-9_-]{40,}'''
tags        = ["key", "anthropic"]

[[rules]]
id          = "firebase-private-key"
description = "Firebase Service Account private key"
regex       = '''-----BEGIN RSA PRIVATE KEY-----'''
tags        = ["key", "firebase"]

[[rules]]
id          = "firebase-web-api-key-real"
description = "Real Firebase Web API Key (AIzaSy + 35 chars)"
regex       = '''AIzaSy[A-Za-z0-9_-]{33}'''
tags        = ["key", "firebase"]

[[rules]]
id          = "stripe-live-key"
description = "Stripe Live Secret Key"
regex       = '''sk_live_[A-Za-z0-9]{24,}'''
tags        = ["key", "stripe", "payment"]

[[rules]]
id          = "stripe-test-key"
description = "Stripe Test Secret Key"
regex       = '''sk_test_[A-Za-z0-9]{24,}'''
tags        = ["key", "stripe"]

[[rules]]
id          = "stripe-webhook-secret"
description = "Stripe Webhook Signing Secret"
regex       = '''whsec_[A-Za-z0-9]{32,}'''
tags        = ["key", "stripe"]

[[rules]]
id          = "sentry-dsn"
description = "Sentry DSN"
regex       = '''https://[0-9a-f]{32}@o[0-9]+\.ingest\.sentry\.io/[0-9]+'''
tags        = ["dsn", "sentry"]

[allowlist]
description = "Ignore example/placeholder values"
regexes     = [
  '''AIzaSy\.\.\.',
  '''sk-ant-DEIN_KEY_HIER''',
  '''YOUR_KEY''',
  '''EXAMPLE''',
  '''placeholder''',
  '''sk_live_\.\.\.',
  '''sk_test_\.\.\.',
  '''whsec_\.\.\.',
  '''REPLACE_WITH''',
]
paths = [
  '''.env.example''',
  '''README''',
  '''docs/''',
  '''firebase_credentials.json''',
]
