# ============================================================
# StudyAI – docker-compose.yml
# Production stack: StudyAI app + Redis + Nginx reverse proxy
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # web – StudyAI Flask/Gunicorn application
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyai_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # SQLite persistence – database file stays outside the container
      - ./data:/app/data
      # Firebase service-account credentials (read-only)
      # Uncomment if firebase_credentials.json exists:
      # - ./firebase_credentials.json:/app/firebase_credentials.json:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      # SQLite file lives in the mounted volume
      - STUDYAI_DB=/app/data/studyai.db
      # Redis URL for rate-limiting
      - REDIS_URL=redis://redis:6379/0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # redis – in-memory store (rate-limiting, caching)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: studyai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # nginx – reverse proxy, SSL termination, static caching
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: studyai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates – mount after obtaining via Let's Encrypt:
      # - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ----------------------------------------------------------
# named volumes
# ----------------------------------------------------------
volumes:
  redis_data:
    driver: local
